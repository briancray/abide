<!--
Optional HTML shell. If present at src/ui/app.html, abide uses this as the SSR
template; otherwise an identical default shell is used. abide has no component
<head>, so static tags like <title> live here. The three markers are replaced at
render time:
  ssr:head     abide's hydration bootstrap
  ssr:body     rendered page body
  ssr:state    cache snapshot + route info for hydration
Delete this file to use the default shell.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>abide app</title>
<link rel="stylesheet" href="/_app/client.css" />
<!--ssr:head-->
</head>
<body>
<div id="app"><!--ssr:body--></div>
<!--ssr:state-->
<script type="module" src="/_app/client.js"></script>
</body>
</html>
