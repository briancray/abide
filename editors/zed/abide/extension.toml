id = "abide"
name = "Abide"
version = "0.0.1"
schema_version = 1
authors = ["Brian Cray"]
description = "Syntax highlighting and type-check diagnostics for .abide components"
repository = "https://github.com/briancray/abide"

# .abide is HTML-shaped; reuse tree-sitter-html for element/attribute/script/style
# structure and embedded-language injections. Everything abide-specific — the
# `{#…}` control-flow blocks and `{expr}` interiors — is highlighted by `abide lsp`
# via LSP semantic tokens (requires `"semantic_tokens": "combined"`), so no
# bespoke grammar is maintained.
[grammars.html]
repository = "https://github.com/tree-sitter/tree-sitter-html"
commit = "bfa075d83c6b97cd48440b3829ab8d24a2319809"

# The diagnostics server: `abide lsp` over stdio. The Rust crate (src/lib.rs)
# resolves the command — a `abide` binary if present, else `bun <repo>/bin lsp`.
[language_servers.abide]
name = "Abide Language Server"
languages = ["Abide"]
